<!DOCTYPE html>

  <script>
    (function() {
      const t = localStorage.getItem('ce-theme'); if (t) document.documentElement.dataset.theme = t;
      const l = localStorage.getItem('ce-lang');  if (l) document.documentElement.dataset.lang  = l;

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #000; --cream: #EDE9E1; --muted: #6E6A65; --muted2: #4A4744;
      --rule: rgba(237,233,225,0.10); --rule-mid: rgba(237,233,225,0.18);
      --nav-h: 60px; --pad-x: clamp(28px, 6vw, 88px);
      --font-d: 'Cormorant Garamond', Georgia, serif;
      --font-b: 'Inter', system-ui, sans-serif;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--black); color: var(--cream);
      font-family: var(--font-b); font-weight: 300; font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    html[data-lang="en"] .fr { display: none !important; }
    html[data-lang="fr"] .en { display: none !important; }

    /* ── Grain ─────────────────────────────────────────── */
    #grain {
      position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.036;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* ── Nav ───────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      height: var(--nav-h); display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--pad-x); border-bottom: 1px solid var(--rule);
    }
    .nav-logo { position: relative; text-decoration: none; display: inline-block; }
    .logo-line { font-family: gunter, sans-serif; font-style: normal; font-weight: 200; font-size: 1.575rem; letter-spacing: 0.04em; color: var(--cream); display: block; line-height: 1.1; user-select: none; }
    .nav-right { display: flex; align-items: center; gap: clamp(18px, 3vw, 40px); }
    .nav-links { display: flex; list-style: none; gap: clamp(14px, 2.5vw, 36px); }
    .nav-links a { font-family: var(--font-b); font-size: 10px; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-links a:hover { color: var(--cream); }
    .lang-toggle { display: flex; gap: 2px; }
    .lang-btn { background: none; border: none; cursor: pointer; font-family: var(--font-b); font-size: 10px; font-weight: 300; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding: 4px 7px; border-bottom: 1px solid transparent; transition: color 0.3s, border-color 0.3s; }
    .lang-btn:hover { color: var(--cream); }
    .lang-btn.active { color: var(--cream); border-bottom-color: var(--cream); }
    .theme-toggle { display: flex; gap: 2px; margin-right: 4px; }
    .theme-btn { background: none; border: none; cursor: pointer; font-family: var(--font-b); font-size: 10px; font-weight: 300; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding: 4px 7px; border-bottom: 1px solid transparent; transition: color 0.3s, border-color 0.3s; }
    .theme-btn:hover { color: var(--cream); }
    .theme-btn.active { color: var(--cream); border-bottom-color: var(--cream); }

    /* ── Windows ───────────────────────────────────────── */
    .win {
      position: fixed;
      border: 1px solid var(--rule-mid);
      background: #060606;
      user-select: none;
      cursor: grab;
      transition: box-shadow 0.2s ease;
    }
    .win:active,
    .win.dragging { cursor: grabbing; box-shadow: 0 12px 48px rgba(0,0,0,0.7); }
    .win:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.5); }

    /* Video / placeholder area */
    .win-body {
      position: relative; overflow: hidden;
      background: #030303;
      display: flex; align-items: center; justify-content: center;
    }
    .win-body video {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }


    /* ── Enter hint ────────────────────────────────────── */
    #enter {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      z-index: 400;
      font-size: 9px; letter-spacing: 0.26em; text-transform: uppercase;
      color: var(--muted2); text-decoration: none;
      transition: color 0.3s, letter-spacing 0.4s var(--ease);
    }
    #enter:hover { color: var(--muted); letter-spacing: 0.36em; }

    /* ── Light theme ───────────────────────────────────── */
    html[data-theme="light"] { --black: #f8f5f0; --cream: #0d0d0d; --muted: #5a5a5a; --muted2: #999; --rule: rgba(0,0,0,0.10); --rule-mid: rgba(0,0,0,0.18); }
    html[data-theme="light"] body { background: var(--black); }
    html[data-theme="light"] .win { background: #fefcfa; border-color: rgba(0,0,0,0.15); }
    html[data-theme="light"] .win-bar { background: rgba(0,0,0,0.03); }
    html[data-theme="light"] .win-body { background: #f0ede8; }
    body, nav, .lang-btn, .nav-links a, .win-title { transition-property: color, background-color, border-color; transition-duration: 0.45s; transition-timing-function: ease; }

    /* ── Mobile ────────────────────────────────────────── */
    @media (max-width: 700px) {
      html, body { overflow-y: auto; height: auto; }
      nav { position: sticky; top: 0; z-index: 500; }
      #win-stack {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding-top: 2px;
      }
      .win {
        position: relative !important;
        left: auto !important;
        top: auto !important;
        z-index: auto !important;
        width: 100% !important;
        cursor: default;
        border-left: none;
        border-right: none;
      }
      .win:hover { box-shadow: none; }
      .win.dragging { box-shadow: none; cursor: default; }
      .win-body {
        width: 100% !important;
        height: 58vw !important;
      }
      #enter {
        position: relative;
        bottom: auto; left: auto; transform: none;
        display: block;
        text-align: center;
        padding: 36px var(--pad-x) 52px;
        font-size: 11px;
        letter-spacing: 0.32em;
        color: var(--cream);
        border-top: 1px solid var(--rule-mid);
        margin-top: 2px;
        z-index: 1;
      }
      #enter:hover { letter-spacing: 0.32em; color: var(--cream); }
    }
  </style>
</head>

<script>
// ── Language ──────────────────────────────────────────────
function setLang(lang) {
  document.documentElement.setAttribute('data-lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  localStorage.setItem('ce-lang', lang);
}
setLang(localStorage.getItem('ce-lang') || 'en');

// ── Theme toggle ──────────────────────────────────────────
function setTheme(t) {
  document.documentElement.dataset.theme = t;
  localStorage.setItem('ce-theme', t);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.themeVal === t));
}
setTheme(localStorage.getItem('ce-theme') || 'dark');
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => setTheme(btn.dataset.themeVal));
});
(function() {
  const line1 = document.getElementById('logo-line-1');
  const line2 = document.getElementById('logo-line-2');
  if (!line1 || !line2) return;
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!@#$%&*àéèêç';
  let timers = [];
  function scrambleTo(el, target, delay, duration) {
    const frames = 18, step = duration / frames;
    let frame = 0;
    const tid = setTimeout(() => {
      const iv = setInterval(() => {
        frame++;
        const done = Math.floor((frame / frames) * target.length);
        let out = target.slice(0, done);
        for (let i = done; i < target.length; i++) out += target[i] === ' ' ? ' ' : chars[Math.floor(Math.random() * chars.length)];
        el.textContent = out;
        if (frame >= frames) { el.textContent = target; clearInterval(iv); }
      }, step);
      timers.push(iv);
    }, delay);
    timers.push(tid);
  }
  function clearTimers() { timers.forEach(t => { clearInterval(t); clearTimeout(t); }); timers = []; }
  const logo = document.getElementById('logo-link');
  if (!logo) return;
  logo.addEventListener('mouseenter', () => { clearTimers(); scrambleTo(line1, 'Corps', 0, 320); scrambleTo(line2, 'Étrange', 60, 380); });
  logo.addEventListener('mouseleave', () => { clearTimers(); scrambleTo(line1, 'Strange', 0, 260); scrambleTo(line2, 'Body', 40, 220); });
})();

// ── Draggable windows ─────────────────────────────────────
let topZ = 20;

document.querySelectorAll('.win').forEach(win => {
  let dragging = false, ox = 0, oy = 0;

  // Mouse drag from anywhere on the window
  win.addEventListener('mousedown', e => {
    dragging = true;
    win.style.zIndex = ++topZ;
    win.classList.add('dragging');
    ox = e.clientX - win.getBoundingClientRect().left;
    oy = e.clientY - win.getBoundingClientRect().top;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    // Constrain to viewport
    const maxX = window.innerWidth  - win.offsetWidth;
    const maxY = window.innerHeight - win.offsetHeight;
    win.style.left = Math.max(0, Math.min(e.clientX - ox, maxX)) + 'px';
    win.style.top  = Math.max(0, Math.min(e.clientY - oy, maxY)) + 'px';
  });

  document.addEventListener('mouseup', () => {
    dragging = false;
    win.classList.remove('dragging');
  });

  // Touch drag
  win.addEventListener('touchstart', e => {
    dragging = true;
    win.style.zIndex = ++topZ;
    ox = e.touches[0].clientX - win.getBoundingClientRect().left;
    oy = e.touches[0].clientY - win.getBoundingClientRect().top;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const maxX = window.innerWidth  - win.offsetWidth;
    const maxY = window.innerHeight - win.offsetHeight;
    win.style.left = Math.max(0, Math.min(e.touches[0].clientX - ox, maxX)) + 'px';
    win.style.top  = Math.max(0, Math.min(e.touches[0].clientY - oy, maxY)) + 'px';
  }, { passive: true });

  document.addEventListener('touchend', () => { dragging = false; });
});
</script>
